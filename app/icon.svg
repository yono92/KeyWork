<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <!-- Outer bezel -->
  <rect x="0" y="0" width="64" height="64" fill="#d4d4d4"/>
  <rect x="0" y="0" width="64" height="2" fill="#ffffff"/>
  <rect x="0" y="0" width="2" height="64" fill="#ffffff"/>
  <rect x="0" y="62" width="64" height="2" fill="#2f2f2f"/>
  <rect x="62" y="0" width="2" height="64" fill="#2f2f2f"/>

  <!-- Inner inset -->
  <rect x="4" y="4" width="56" height="56" fill="#1a1a2e"/>
  <rect x="4" y="4" width="56" height="2" fill="#0a0a1a"/>
  <rect x="4" y="4" width="2" height="56" fill="#0a0a1a"/>
  <rect x="4" y="58" width="56" height="2" fill="#333355"/>
  <rect x="58" y="4" width="2" height="56" fill="#333355"/>

  <!-- Keyboard keys row 1 -->
  <rect x="10" y="14" width="8" height="6" rx="1" fill="#333355" stroke="#5555aa" stroke-width="0.5"/>
  <rect x="20" y="14" width="8" height="6" rx="1" fill="#333355" stroke="#5555aa" stroke-width="0.5"/>
  <rect x="30" y="14" width="8" height="6" rx="1" fill="#333355" stroke="#5555aa" stroke-width="0.5"/>
  <rect x="40" y="14" width="12" height="6" rx="1" fill="#333355" stroke="#5555aa" stroke-width="0.5"/>

  <!-- Keyboard keys row 2 -->
  <rect x="10" y="24" width="10" height="6" rx="1" fill="#333355" stroke="#5555aa" stroke-width="0.5"/>
  <rect x="22" y="24" width="8" height="6" rx="1" fill="#333355" stroke="#5555aa" stroke-width="0.5"/>
  <rect x="32" y="24" width="8" height="6" rx="1" fill="#333355" stroke="#5555aa" stroke-width="0.5"/>
  <rect x="42" y="24" width="10" height="6" rx="1" fill="#333355" stroke="#5555aa" stroke-width="0.5"/>

  <!-- Keyboard keys row 3 (spacebar) -->
  <rect x="10" y="34" width="6" height="6" rx="1" fill="#333355" stroke="#5555aa" stroke-width="0.5"/>
  <rect x="18" y="34" width="26" height="6" rx="1" fill="#333355" stroke="#5555aa" stroke-width="0.5"/>
  <rect x="46" y="34" width="6" height="6" rx="1" fill="#333355" stroke="#5555aa" stroke-width="0.5"/>

  <!-- "KW" text -->
  <text x="32" y="52" text-anchor="middle" font-family="monospace" font-size="8" font-weight="bold" fill="#00e5ff">KW</text>
</svg>
